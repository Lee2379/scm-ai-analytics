<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SCM Analytical Workspace Design QA</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #171717; color: #fff; font-family: Arial, sans-serif; }

    figure { margin: 0; padding: 12px; background: #242424; }

    img { display: block; width: 100%; height: auto; background: #fff; }
  </style>
</head>
<body>
  <main>
    <figure>
      <figcaption>Selected reference — Analytical Workspace</figcaption>
      <img src="scm-analytical-workspace-reference.png" alt="Selected analytical workspace reference">
    </figure>
    <figure>
      <figcaption>Streamlit implementation — Overview</figcaption>
      <img src="scm-analytical-workspace-implementation.png" alt="Implemented Streamlit analytical workspace">
    </figure>
  </main>
</body>
</html>
